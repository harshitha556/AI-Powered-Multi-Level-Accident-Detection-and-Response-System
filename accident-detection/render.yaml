services:
  - type: web
    name: accident-detection
    runtime: python
    rootDir: backend
    pythonVersion: "3.11"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: LOCATION
        value: "12.9716,77.5946"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: AMBULANCE_EMAIL
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: EMERGENCY_CONTACT_EMAIL
        sync: false
